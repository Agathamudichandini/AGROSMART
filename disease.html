<!DOCTYPE html>
<html>
<head>
    <title>Plant Diseases</title>
    <link rel="stylesheet" href="disease.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header class="navbar">
    <div class="logo" data-key="logo">
        <i class="fas fa-leaf"></i> AGROSMART
    </div>
    <nav>
        <a href="HOME.HTML" data-key="home"><i class="fas fa-home"></i> Home</a>
        <a href="about.html" data-key="about"><i class="fas fa-info-circle"></i> About</a>
        <a href="contact.html" data-key="contact"><i class="fas fa-envelope"></i> Contact</a>
         <!-- <select id="languageSelect">
                <option value="en">English</option>
                <option value="te">తెలుగు</option>
                <option value="hi">Hindi</option>
            </select>  -->
    </nav>
</header>

<section class="container">

    <h1 data-key="pageTitle">Plant Diseases</h1>

    <!-- Search Bar -->
    <div class="search-wrapper">
        <input type="text"
               id="searchInput"
               data-key="searchPlaceholder"
               placeholder="Search disease..."
               onkeyup="searchDisease()">

        <label for="imageUpload" class="upload-icon" data-key="uploadLabel">
            <i class="fas fa-camera"></i>
        </label>

        <input type="file"
               id="imageUpload"
               accept="image/*"
               hidden>
    </div>

    <!-- Disease Cards -->
    <div class="card-container" id="diseaseList" data-key="diseaseList">

        <div class="card" data-key="powdery">
            <a href="details.html?disease=powdery">
                <img src="images/powderymildew.png" alt="" data-key="powderyImage">
                <h3 data-key="powderyName">Powdery Mildew</h3>
            </a>
        </div>

        <div class="card" data-key="leafspot">
            <a href="details.html?disease=leafspot">
                <img src="images/black spot.png" alt="" data-key="leafspotImage">
                <h3 data-key="leafspotName">Leaf Spot</h3>
            </a>
        </div>

        <div class="card" data-key="downy">
            <a href="details.html?disease=downy">
                <img src="images/downymildew.png" alt="" data-key="downyImage">
                <h3 data-key="downyName">Downy Mildew</h3>
            </a>
        </div>

        <div class="card" data-key="blight">
            <a href="details.html?disease=blight">
                <img src="images/tomatoblight.png" alt="" data-key="blightImage">
                <h3 data-key="blightName">Blight</h3>
            </a>
        </div>

        <div class="card" data-key="botrytis">
            <a href="details.html?disease=botrytis">
                <img src="images/Botrytis blight.png" alt="" data-key="botrytisImage">
                <h3 data-key="botrytisName">Botrytis Blight</h3>
            </a>
        </div>

        <div class="card" data-key="verticillium">
            <a href="details.html?disease=verticillium">
                <img src="images/Verticillium wilt.png" alt="" data-key="verticilliumImage">
                <h3 data-key="verticilliumName">Verticillium Wilt</h3>
            </a>
        </div>

        <div class="card" data-key="fusarium">
            <a href="details.html?disease=fusarium">
                <img src="images/Fusarium Wilt.png" alt="" data-key="fusariumImage">
                <h3 data-key="fusariumName">Fusarium Wilt</h3>
            </a>
        </div>

        <div class="card" data-key="rust">
            <a href="details.html?disease=rust">
                <img src="images/rust.png" alt="" data-key="rustImage">
                <h3 data-key="rustName">Rust Disease</h3>
            </a>
        </div>

    </div>

    <div style="text-align:center; margin-top:30px;">
        <a href="category.html">
            <button style="
                padding:12px 25px;
                background:#2e7d32;
                color:white;
                border:none;
                border-radius:6px;
                cursor:pointer;
                font-size:16px;" 
                data-key="knowMoreBtn">
                Know More →
            </button>
        </a>
    </div>

</section>

<script src="disease.js"></script>
<!-- <script src="auto-translate.js"></script> -->
</body>
</html>
