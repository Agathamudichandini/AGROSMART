<!DOCTYPE html>
<html>
<head>
    <title>Plant Details</title>
    <link rel="stylesheet" href="plant-detail.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <i class="fas fa-leaf"></i> AGROSMART
    </div>
</header>

<nav>
    <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i> Back</a>
     <select id="languageSelect">
                <option value="en">English</option>
                <option value="te">తెలుగు</option>
                <option value="hi">Hindi</option>
            </select>
</nav>

<div class="container">
    <!-- Plant Name -->
    <h1 id="plantTitle" data-key="name"></h1>

    <!-- Plant Images -->
    <div id="plantImages" data-key="images">
        <!-- JS will fill images dynamically -->
    </div>

    <!-- Plant Description -->
    <div id="plantContent">
        <p data-key="description"></p>
        <p data-key="scientificName"></p>
        <p data-key="careTips"></p>
        <div data-key="diseases">
            <strong>Common Diseases:</strong>
            <ul>
                <!-- JS will populate disease list -->
            </ul>
        </div>
    </div>
</div>

<script src="plant-details.js"></script>

</body>
</html>
