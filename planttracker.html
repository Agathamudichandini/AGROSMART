<!DOCTYPE html>
<html>
<head>
    <title>Smart Plant Care Assistant</title>
    <link rel="stylesheet" href="tracker.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
   <a href="javascript:history.back()" data-key="backButton">Back</a>
<h1 data-key="pageTitle">🌿 Smart Plant Care Assistant</h1>

<div class="form-box">
    <input type="text" id="plantName" placeholder="Plant Name" data-key-placeholder="plantNamePlaceholder">

    <label data-key="waterLabel">Water Every (days)</label>
    <input type="number" id="waterDays">

    <label data-key="fertilizerLabel">Fertilizer Every (days)</label>
    <input type="number" id="fertilizerDays">

    <button onclick="addPlant()" data-key="addButton">Add Plant</button>
    <button class="danger" onclick="clearAll()" data-key="clearButton">Clear All</button>
</div>

<div id="plantList"></div>

<script src="tracker.js"></script>
</body>
</html>
